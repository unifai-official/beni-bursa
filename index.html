<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1e3a8a" />
    <title>Beni Bursa · השקעות חכמות</title>
    <style>
      :root {
        --ios-spring: cubic-bezier(0.32, 0.72, 0, 1);
        --ios-snappy: cubic-bezier(0.4, 0.0, 0.2, 1);
        --ios-soft:   cubic-bezier(0.25, 0.1, 0.25, 1);
        --ios-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
        --brand-deep: #0c1e4e;
        --brand:      #1e3a8a;
        --brand-mid:  #3b82f6;
        --brand-accent: #8b5cf6;
        --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
        --shadow-md: 0 1px 2px rgba(0,0,0,0.04), 0 4px 12px rgba(0,0,0,0.06);
        --shadow-lg: 0 1px 2px rgba(0,0,0,0.04), 0 4px 12px rgba(0,0,0,0.06), 0 16px 40px rgba(30,58,138,0.08);
        --shadow-xl: 0 1px 2px rgba(0,0,0,0.05), 0 8px 24px rgba(0,0,0,0.08), 0 24px 64px rgba(30,58,138,0.12);
      }

      * { box-sizing: border-box; }

      html, body {
        margin: 0;
        padding: 0;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
        -webkit-tap-highlight-color: transparent;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", system-ui, Roboto, sans-serif;
        overflow-x: hidden;
      }

      /* ===== Splash Screen ===== */
      @keyframes splash-rise {
        0%   { opacity: 0; transform: translateY(32px) scale(0.92); }
        100% { opacity: 1; transform: translateY(0) scale(1); }
      }
      @keyframes splash-float {
        0%, 100% { transform: translateY(0); }
        50%      { transform: translateY(-10px); }
      }
      @keyframes splash-orb-float {
        0%, 100% { transform: translate(0, 0) scale(1); }
        50%      { transform: translate(24px, -20px) scale(1.12); }
      }
      @keyframes splash-shimmer {
        0%   { left: -45%; }
        100% { left: 100%; }
      }
      @keyframes splash-fade-out {
        to { opacity: 0; visibility: hidden; pointer-events: none; }
      }
      @keyframes splash-text-reveal {
        0%   { opacity: 0; transform: translateY(14px); letter-spacing: -4px; filter: blur(8px); }
        100% { opacity: 1; transform: translateY(0);    letter-spacing: -1px; filter: blur(0);   }
      }

      /* ===== App-wide animations ===== */
      @keyframes card-in {
        0%   { opacity: 0; transform: translateY(16px); }
        100% { opacity: 1; transform: translateY(0);    }
      }
      @keyframes fade-in {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
      @keyframes slide-up-in {
        0%   { opacity: 0; transform: translateY(24px); }
        100% { opacity: 1; transform: translateY(0);    }
      }
      @keyframes sheet-slide-up {
        0%   { transform: translateY(100%); }
        100% { transform: translateY(0);    }
      }
      @keyframes backdrop-fade {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
      @keyframes fab-pulse {
        0%, 100% { box-shadow: 0 8px 24px rgba(59,130,246,0.35), 0 0 0 0 rgba(139,92,246,0.35); }
        50%      { box-shadow: 0 8px 24px rgba(59,130,246,0.35), 0 0 0 12px rgba(139,92,246,0);  }
      }

      .bb-card-enter {
        animation: card-in 0.55s var(--ios-spring) both;
      }

      .bb-press {
        transition: transform 0.22s var(--ios-spring), box-shadow 0.22s var(--ios-soft);
      }
      .bb-press:active { transform: scale(0.97); }

      .bb-tab-content {
        animation: slide-up-in 0.4s var(--ios-spring) both;
      }

      .bb-glass {
        backdrop-filter: blur(20px) saturate(180%);
        -webkit-backdrop-filter: blur(20px) saturate(180%);
      }

      button { font-family: inherit; }

      /* ===== Custom scrollbar (subtle, webkit only) ===== */
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb {
        background: rgba(30,58,138,0.18);
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover { background: rgba(30,58,138,0.32); }

      /* ===== Reduced motion: respect user preference (Apple standard) ===== */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }

      /* ===== Prevent FOUC during Babel compile ===== */
      #root:empty::before {
        content: '';
        position: fixed;
        inset: 0;
        background: radial-gradient(circle at 30% 20%, #1e3a8a, #0c1e4e 60%);
        z-index: -1;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel" src="./BeniBursa.jsx"></script>
  </body>
</html>
